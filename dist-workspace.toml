[workspace]
members = ["cargo:."]

# cargo-dist configuration. See https://opensource.axo.dev/cargo-dist/.
[dist]
# Pin to the cargo-dist version used to generate the release workflow.
cargo-dist-version = "0.31.0"

# CI backend.
ci = "github"

# Installers generated alongside the platform tarballs.
# - shell:      `curl … | sh` for Linux / macOS
# - powershell: `irm … | iex`  for Windows
#
# `homebrew` is intentionally omitted until the `julymetodiev/homebrew-veles`
# tap repo + `HOMEBREW_TAP_TOKEN` secret are set up. Re-add it to enable
# auto-publish of the formula.
installers = ["shell", "powershell"]

# Target triples to build for.
#
# Linux uses gnu (glibc) rather than musl: tokenizers/esaxx-rs has C++
# code that needs `*-linux-musl-g++`, which isn't on the default GitHub
# Actions runner. gnu builds work out of the box but need glibc 2.31+
# on the host (Ubuntu 20.04+, Debian 11+, RHEL 8+, etc.). Users on
# Alpine or other musl distros can `cargo install veles-cli`.
targets = [
    "aarch64-apple-darwin",
    "x86_64-apple-darwin",
    "x86_64-unknown-linux-gnu",
    "x86_64-pc-windows-msvc",
]

# Publish jobs run after the release artifacts are uploaded.
# `./publish-crates` is a custom workflow that pushes the four library
# crates (in dependency order) to crates.io. The job is idempotent —
# already-published versions are skipped, so re-running on the same tag
# is safe.
publish-jobs = ["./publish-crates"]

# On pull requests, only run `dist plan` (validates config without
# building). Full multi-platform builds run only on tag push.
pr-run-mode = "plan"

# Always include source archives in releases.
source-tarball = true

# Generate per-platform checksum files alongside the artifacts.
checksum = "sha256"
