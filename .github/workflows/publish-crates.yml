# Custom cargo-dist publish job: pushes the four library crates to crates.io
# in dependency order. Triggered by release.yml after the GitHub Release
# artifacts have been uploaded.
#
# Idempotent: each crate is checked against crates.io's API before
# publishing, so re-running this workflow on a tag whose crates are already
# published (e.g. when a release was bootstrapped manually, or when the
# workflow is retried after a partial failure) is a no-op.
#
# Required secrets:
#   CARGO_REGISTRY_TOKEN  — crates.io API token with publish scope
#                           (Settings → Secrets and variables → Actions)

name: Publish to crates.io

on:
  workflow_call:
    inputs:
      plan:
        required: true
        type: string

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust
        run: rustup update stable --no-self-update && rustup default stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
          key: cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Publish in dependency order (idempotent)
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          set -uo pipefail

          # Run `cargo publish`. If it succeeds, great. If it fails with
          # "already exists" / "already uploaded" — the version is already
          # on crates.io — treat as success. Any other failure aborts.
          publish_or_skip() {
            local crate="$1"
            local out rc
            echo "→ cargo publish -p ${crate}"
            out=$(cargo publish -p "${crate}" 2>&1) && rc=0 || rc=$?
            echo "${out}"
            if [ "${rc}" -eq 0 ]; then
              echo "✓ published ${crate}"
            elif echo "${out}" | grep -qE "(already exists on|already uploaded)"; then
              echo "✓ ${crate} already on crates.io — skipping"
            else
              echo "✗ unexpected failure (exit ${rc})"
              return "${rc}"
            fi
          }

          publish_or_skip veles-core
          publish_or_skip veles-grpc
          publish_or_skip veles-mcp
          publish_or_skip veles-cli
